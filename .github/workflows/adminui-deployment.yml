name: Frontend CI Pipeline

on:
  push:
    branches: [ main ]

jobs:

  checkout-source-code:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

  build-and-publish-artifact:
    name: Build and Publish Artifact
    runs-on: ubuntu-latest
    needs: checkout-source-code

    steps:
      - uses: actions/checkout@v4

      - name: Install zip
        run: sudo apt-get update && sudo apt-get install -y zip

      # ✅ Package full frontend (tracking_admin root)
      - name: Zip AdminUI app
        run: |
          zip -r AdminUI-package.zip . \
            -x "*.git*" "node_modules/*" "dist/*"

      - name: Checkout Artifact Repo
        uses: actions/checkout@v4
        with:
          repository: SoftwareStackSolutions/digi_community_booktrack_artifact
          token: ${{ secrets.MY_GITHUB_TOKEN }}
          path: artifact-repo

      # ✅ Use Frontend folder
      - name: Check previous hash
        run: |
          mkdir -p artifact-repo/AdminUI
          cd artifact-repo/AdminUI

          latest_file=$(ls AdminUI-v*.zip 2>/dev/null | sort -V | tail -n 1)

          if [[ -f "$latest_file" ]]; then
            unzip -p "$latest_file" | sha256sum | cut -d' ' -f1 > ../../../latest_hash.txt
          else
            echo "no_previous_hash" > ../../../latest_hash.txt
          fi

      - name: Generate current hash
        run: |
          unzip -p AdminUI-package.zip | sha256sum | cut -d' ' -f1 > current_hash.txt

      - name: Compare hash
        id: hash
        run: |
          if cmp -s latest_hash.txt current_hash.txt; then
            echo "no_change=true" >> $GITHUB_OUTPUT
          else
            echo "no_change=false" >> $GITHUB_OUTPUT
          fi

      - name: Skip if no change
        if: steps.hash.outputs.no_change == 'true'
        run: echo "No changes detected"

      - name: Get next version
        if: steps.hash.outputs.no_change == 'false'
        id: version
        run: |
          cd artifact-repo/AdminUI
          count=$(ls AdminUI-v*.zip 2>/dev/null | wc -l)
          echo "version=v$((count + 1))" >> $GITHUB_OUTPUT

      - name: Move artifact
        if: steps.hash.outputs.no_change == 'false'
        run: |
          VERSION=${{ steps.version.outputs.version }}

          mv AdminUI-package.zip artifact-repo/AdminUI/AdminUI-${VERSION}.zip
          cp artifact-repo/AdminUI/AdminUI-${VERSION}.zip artifact-repo/AdminUI/AdminUI-latest.zip

      - name: Commit & Push
        if: steps.hash.outputs.no_change == 'false'
        run: |
          cd artifact-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add AdminUI/*.zip
          git commit -m "Add AdminUI Artifact ${{ steps.version.outputs.version }}"
          git push origin main

  Container-Build-and-Publish:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: build-and-publish-artifact

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      - name: Checkout artifact repo
        uses: actions/checkout@v4
        with:
          repository: SoftwareStackSolutions/digi_community_booktrack_artifact
          token: ${{ secrets.MY_GITHUB_TOKEN }}
          path: artifact-repo

      - name: Copy latest artifact
        run: |
          cp artifact-repo/AdminUI/AdminUI-latest.zip ./artifact.zip

      - name: Extract artifact
        run: |
          mkdir app
          unzip artifact.zip -d app

      # ✅ Install dependencies & build Vite app
      - name: Build AdminUI
        run: |
          cd app
          npm install
          npm run build

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.MY_GITHUB_TOKEN }}

      # ✅ Use nginx for serving built files
      - name: Build Docker image
        run: |
          docker build -t admin-frontend:latest ./app

      - name: Tag image
        run: |
          OWNER=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          docker tag admin-frontend:latest ghcr.io/$OWNER/admin-frontend:latest

      - name: Push image
        run: |
          OWNER=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          docker push ghcr.io/$OWNER/admin-frontend:latest

  deploy-to-eks:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: Container-Build-and-Publish
  
    permissions:
      id-token: write
      contents: read
  
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
  
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
  
      - name: Install kubectl
        uses: azure/setup-kubectl@v4
  
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ secrets.AWS_REGION }} \
            --name ${{ secrets.EKS_CLUSTER_NAME }}
  
      - name: Deploy to cluster
        run: |        
          kubectl apply -f k8s/admin-deployment.yaml
          kubectl apply -f k8s/admin-service.yaml
  
      - name: Restart deployment
        run: |
          kubectl rollout restart deployment admin-frontend -n tracking-app
