name: Admin UI CI Pipeline

on:
  push:
    branches:
      - acceptance

jobs:

# -----------------------------------------
# 1️⃣ CHECKOUT
# -----------------------------------------
  checkout-source-code:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

# -----------------------------------------
# 2️⃣ BUILD ARTIFACT + VERSIONING
# -----------------------------------------
  build-and-publish-artifact:
    name: Build and Publish Artifact

    runs-on: ubuntu-latest

    needs: checkout-source-code

    outputs:
      version: ${{ steps.set_version.outputs.version }}

    steps:

      - uses: actions/checkout@v4

      - name: Install zip
        run: |
          sudo apt-get update
          sudo apt-get install -y zip unzip

      # ZIP ADMIN UI
      - name: Zip AdminUI app
        run: |
          zip -r AdminUI-package.zip . \
            -x "*.git*" "node_modules/*" "dist/*" ".github/*"

      # CHECKOUT ARTIFACT REPO
      - name: Checkout Artifact Repo
        uses: actions/checkout@v4
        with:
          repository: SoftwareStackSolutions/digi_community_booktrack_artifact
          token: ${{ secrets.MY_GITHUB_TOKEN }}
          path: artifact-repo

      # CHECK PREVIOUS HASH
      - name: Check previous hash
        run: |
          mkdir -p artifact-repo/AdminUI

          cd artifact-repo/AdminUI

          latest_file=$(ls AdminUI-v*.zip 2>/dev/null | sort -V | tail -n 1)

          if [[ -f "$latest_file" ]]; then
            sha256sum "$latest_file" | cut -d' ' -f1 > ../../../latest_hash.txt
          else
            echo "no_previous_hash" > ../../../latest_hash.txt
          fi

      # CURRENT HASH
      - name: Generate current hash
        run: |
          sha256sum AdminUI-package.zip | cut -d' ' -f1 > current_hash.txt

      # COMPARE HASH
      - name: Compare hash
        id: hash
        run: |
          if cmp -s latest_hash.txt current_hash.txt; then
            echo "no_change=true" >> $GITHUB_OUTPUT
          else
            echo "no_change=false" >> $GITHUB_OUTPUT
          fi

      # VERSION
      - name: Generate version
        id: set_version
        run: |
          cd artifact-repo/AdminUI

          count=$(ls AdminUI-v*.zip 2>/dev/null | wc -l)

          if [ "${{ steps.hash.outputs.no_change }}" = "true" ]; then
            echo "version=latest" >> $GITHUB_OUTPUT
          else
            echo "version=v$((count + 1))" >> $GITHUB_OUTPUT
          fi

      # MOVE ARTIFACT
      - name: Move artifact
        if: steps.hash.outputs.no_change == 'false'
        run: |
          VERSION=${{ steps.set_version.outputs.version }}

          mv AdminUI-package.zip \
             artifact-repo/AdminUI/AdminUI-${VERSION}.zip

          cp artifact-repo/AdminUI/AdminUI-${VERSION}.zip \
             artifact-repo/AdminUI/AdminUI-latest.zip

      # COMMIT
      - name: Commit & Push
        if: steps.hash.outputs.no_change == 'false'
        run: |
          cd artifact-repo

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add AdminUI/*.zip

          git commit -m "AdminUI Artifact ${{ steps.set_version.outputs.version }}"

          git push origin main

# -----------------------------------------
# 3️⃣ BUILD & PUSH TO ECR
# -----------------------------------------
  container-build-and-publish:
    name: Build & Push Docker Image

    runs-on: ubuntu-latest

    needs: build-and-publish-artifact

    permissions:
      id-token: write
      contents: read

    steps:

      - name: Checkout main repo
        uses: actions/checkout@v4

      # CHECKOUT ARTIFACT REPO
      - name: Checkout artifact repo
        uses: actions/checkout@v4
        with:
          repository: SoftwareStackSolutions/digi_community_booktrack_artifact
          token: ${{ secrets.MY_GITHUB_TOKEN }}
          path: artifact-repo

      # COPY ARTIFACT
      - name: Copy latest artifact
        run: |
          cp artifact-repo/AdminUI/AdminUI-latest.zip ./artifact.zip

      # EXTRACT
      - name: Extract artifact
        run: |
          rm -rf app

          mkdir app

          unzip artifact.zip -d app

      # DEBUG
      - name: Debug structure
        run: |
          ls -R app

      # BUILD ADMIN UI
      - name: Build AdminUI
        run: |
          cd app

          if [ -f package.json ]; then
            echo "package.json found at root"
          else
            echo "Searching for package.json..."
            cd $(find . -name package.json -not -path "*/node_modules/*" | head -n 1 | xargs dirname)
          fi

          npm install
          npm run build

      # AWS LOGIN
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      # ACCOUNT ID
      - name: Get AWS Account ID
        id: aws_account
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)

          echo "account_id=$ACCOUNT_ID" >> $GITHUB_OUTPUT

      # LOGIN ECR
      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
          | docker login \
            --username AWS \
            --password-stdin \
            ${{ steps.aws_account.outputs.account_id }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

      # BUILD IMAGE
      - name: Build Docker image
        run: |
          docker build -t admin-ui ./app/tracking_admin

      # TAG IMAGE
      - name: Tag image
        run: |
          VERSION=${{ needs.build-and-publish-artifact.outputs.version }}

          ACCOUNT_ID=${{ steps.aws_account.outputs.account_id }}

          REGION=${{ secrets.AWS_REGION }}

          ECR_URI=$ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com/admin-ui

          docker tag admin-ui:latest $ECR_URI:$VERSION
          docker tag admin-ui:latest $ECR_URI:latest

      # PUSH IMAGE
      - name: Push image
        run: |
          VERSION=${{ needs.build-and-publish-artifact.outputs.version }}

          ACCOUNT_ID=${{ steps.aws_account.outputs.account_id }}

          REGION=${{ secrets.AWS_REGION }}

          ECR_URI=$ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com/admin-ui

          docker push $ECR_URI:$VERSION
          docker push $ECR_URI:latest

# -----------------------------------------
# 4️⃣ DEPLOY TO EKS
# -----------------------------------------
  deploy-to-eks:
    name: Deploy to EKS

    runs-on: ubuntu-latest

    needs:
      - container-build-and-publish
      - build-and-publish-artifact

    permissions:
      id-token: write
      contents: read

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      # AWS LOGIN
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      # ACCOUNT ID
      - name: Get AWS Account ID
        id: aws_account
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)

          echo "account_id=$ACCOUNT_ID" >> $GITHUB_OUTPUT

      # INSTALL KUBECTL
      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      # UPDATE KUBECONFIG
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ secrets.AWS_REGION }} \
            --name ${{ secrets.ACC_EKS_CLUSTER_NAME }}

      # DEPLOY
      - name: Deploy to cluster
        run: |

          VERSION=${{ needs.build-and-publish-artifact.outputs.version }}

          ACCOUNT_ID=${{ steps.aws_account.outputs.account_id }}

          REGION=${{ secrets.AWS_REGION }}

          IMAGE="$ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com/admin-ui:$VERSION"

          echo "Deploying image: $IMAGE"

          kubectl apply -f k8s/admin-deployment.yaml

          kubectl apply -f k8s/admin-service.yaml

          kubectl set image deployment/admin-frontend \
            admin=$IMAGE \
            -n tracking-app

          kubectl rollout status deployment/admin-frontend -n tracking-app

      # VERIFY
      - name: Verify Pods
        run: |
          kubectl get pods -n tracking-app
